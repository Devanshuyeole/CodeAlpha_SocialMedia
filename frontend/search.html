<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Nexus</title>
    <link rel="stylesheet" href="search.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <span class="logo-n">N</span><span class="logo-x">X</span>
            </div>
            <nav class="main-nav">
            
                <button id="logout-button">Logout</button>
            </nav>
        </div>
    </header>

    <main class="search-container">
        <div class="search-bar-wrapper">
            <input type="search" id="search-input" placeholder="Search for users...">
        </div>
        <div id="search-results-container" class="search-results-container">
        </div>
    </main>

    <script src="search.js" defer></script>
</body>
</html>
