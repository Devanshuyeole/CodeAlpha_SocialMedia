<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Sign In / Sign Up</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div class="logo-container">
            <div class="css-logo">
                <span class="logo-n">N</span><span class="logo-x">X</span>
                <span class="logo-text">NEXUS</span>
            </div>
        </div>

        <div class="auth-card">
            <h2 id="auth-title" class="auth-title">Welcome Back</h2> 
            
            <form id="auth-form" class="login-form">
                <div class="input-group" id="username-group">
                    <input type="text" id="username" placeholder="Username or email" required>
                </div>
                
                <div class="input-group" id="email-group" style="display: none;">
                    <input type="email" id="email" placeholder="Email">
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="input-group" id="confirm-password-group" style="display: none;">
                    <input type="password" id="confirm-password" placeholder="Confirm Password">
                </div>

                <button type="submit" id="auth-button" class="auth-button">SIGN IN</button>
            </form>
            <div id="auth-message" class="auth-message"></div>
            <div id="auth-links" class="auth-links">
                <a href="forgot-password.html" id="forgot-password-link" class="forgot-password-link">Forgot Password?</a>
                <p id="toggle-text">Don't have an account? <a href="#" id="toggle-link" class="signup-link">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script src="login.js" defer></script>
</body>
</html>
